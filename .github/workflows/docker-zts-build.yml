name: Build New Relic PHP agent (ZTS) multi-arch release

permissions:
  contents: write

env:
  upstream-repo: theophileds/newrelic-php-agent-zts
  upstream-ref: zts-support
  frankenphp-image: dunglas/frankenphp

on:
  workflow_dispatch:
    inputs:
      frankenphp-version:
        description: FrankenPHP tag for PHP_IMAGE build-arg (e.g. 1-php8.4)
        required: true
        default: 1-builder-php8.4
      release_tag:
        description: Git tag for the GitHub release (leave empty to auto-generate)
        required: false
        default: ""
      create_release:
        description: Create a GitHub release and attach tarballs
        type: boolean
        default: true

  workflow_call:
    inputs:
      frankenphp-version:
        description: FrankenPHP tag for PHP_IMAGE build-arg (e.g. 1-php8.4)
        required: true
        type: string
      release_tag:
        description: Git tag for the GitHub release (empty = auto)
        required: false
        type: string
        default: ""
      create_release:
        description: Create a GitHub release and attach tarballs
        required: false
        type: boolean
        default: true

jobs:
  builder:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            slug: linux-amd64
          #          - platform: linux/arm64
          #            slug: linux-arm64
          #          - platform: linux/arm/v7
          #            slug: linux-arm-v7
#          - platform: linux/386
#            slug: linux-386
    steps:
      - name: Checkout upstream source
        uses: actions/checkout@v6
        with:
          path: 'build'

      - name: Checkout upstream source
        uses: actions/checkout@v6
        with:
          repository: ${{ env.upstream-repo }}
          ref: ${{ env.upstream-ref }}
          path: 'newrelic-php-agent-zts'

      - name: Update newrelic-php-agent-zts with upstream
        run:
          cd $GITHUB_WORKSPACE/newrelic-php-agent-zts
          git remote add upstream https://github.com/newrelic/newrelic-php-agent.git
          git fetch upstream
          git merge upstream/main

