name: Build New Relic PHP agent (ZTS) multi-arch

on:
  workflow_dispatch:

env:
  IMAGE_NAME: newrelic-php-zts
  DOCKERFILE: Dockerfile.zts-build
  UPSTREAM_REPO: theophileds/newrelic-php-agent-zts
  UPSTREAM_REF: zts-support

jobs:
  docker-build:
    name: docker buildx (linux/amd64, linux/arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream (zts-support)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ env.UPSTREAM_REF }}

      - name: Set up QEMU (for non-amd64 platforms on x86 runners)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Equivalent to: docker buildx build --platform ... -f Dockerfile.zts-build -t newrelic-php-zts .
      # Multi-platform images are not loaded into the local daemon; this job validates the image builds.
      - name: Build image (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_NAME }}:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
