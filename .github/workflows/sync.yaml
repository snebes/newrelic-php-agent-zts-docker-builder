name: Sync tags from dunglas/frankenphp

on:
  schedule:
    - cron: '0 0 * * 6'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  collect-tags:
    name: Collects tags from docker hub
    runs-on: ubuntu-latest
    outputs:
      tags_json: ${{ steps.fetch.outputs.tags_json }}
    steps:
      - name: Fetch tags
        id: fetch
        env:
          PAGE_SIZE: "100"
          MAX_PAGES: "50"
          MAX_TAGS: "200"
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          echo '[]' > "${workdir}/accum.json"
          url="https://hub.docker.com/v2/repositories/dunglas/frankenphp/tags?page_size=${PAGE_SIZE}"
          pages=0

          while [[ -n "${url}" && "${pages}" -lt "${MAX_PAGES}" ]]; do
            curl -fsSL "${url}" -o "${workdir}/page.json"
            jq -s '.[0] + .[1].results' "${workdir}/accum.json" "${workdir}/page.json" \
              > "${workdir}/accum.next.json"
            mv "${workdir}/accum.next.json" "${workdir}/accum.json"
            url="$(jq -r '.next // empty' "${workdir}/page.json")"
            pages=$((pages + 1))
          done

          # Names like 1-php8.5, 1.2-php8.3 — only string .name (skip bad API rows); then regex
          jq -c '
            [ .[]
              | objects
              | .name
              | select(type == "string")
              | select(
                  test("^[0-9]+(\\.[0-9]+){0,2}-php[0-9]+(\\.[0-9]+){0,2}(-(trixie|bookworm))?$")
                )
              ]
            | unique
            | sort
          ' "${workdir}/accum.json" > "${workdir}/filtered.json"

          max="${MAX_TAGS:-0}"
          if [[ "${max}" =~ ^[0-9]+$ ]] && [[ "${max}" -gt 0 ]]; then
            jq -c --argjson lim "${max}" '.[:$lim]' "${workdir}/filtered.json" > "${workdir}/limited.json"
            mv "${workdir}/limited.json" "${workdir}/filtered.json"
          fi

          n="$(jq 'length' "${workdir}/filtered.json")"
          if [[ "${n}" -gt 256 ]]; then
            echo "::warning::${n} tags match; GitHub matrix allows 256 jobs — truncating to 256."
            jq -c '.[:256]' "${workdir}/filtered.json" > "${workdir}/trunc.json"
            mv "${workdir}/trunc.json" "${workdir}/filtered.json"
            n=256
          fi

          tags_json="$(cat "${workdir}/filtered.json")"
          {
            echo "tags_json<<__TAGS_JSON__"
            echo "${tags_json}"
            echo "__TAGS_JSON__"
          } >> "${GITHUB_OUTPUT}"

          echo "Matching tags (${n}):"
          jq -r '.[]' "${workdir}/filtered.json" | sed 's/^/  /'

  filter-missing-tags:
    name: Tags not yet on Docker Hub
    runs-on: ubuntu-latest
    needs: collect-tags
    outputs:
      tags_json: ${{ steps.filter.outputs.tags_json }}
    env:
      PAGE_SIZE: "100"
      MAX_PAGES: "50"
      DOCKERHUB_REPO: frankenphp-unofficial-newrelic
    steps:
      - name: Filter to tags missing from our repository
        id: filter
        env:
          UPSTREAM_TAGS_JSON: ${{ needs.collect-tags.outputs.tags_json }}
          DOCKERHUB_USER: ${{ vars.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail

          if [[ "$(echo "${UPSTREAM_TAGS_JSON}" | jq 'length')" -eq 0 ]]; then
            echo 'No upstream tags to check; skipping Docker Hub listing.'
            tags_json='[]'
            {
              echo "tags_json<<__TAGS_JSON__"
              echo "${tags_json}"
              echo "__TAGS_JSON__"
            } >> "${GITHUB_OUTPUT}"
            echo "Missing (not on Hub yet) (0):"
            exit 0
          fi

          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          url="https://hub.docker.com/v2/repositories/${DOCKERHUB_USER}/${DOCKERHUB_REPO}/tags?page_size=${PAGE_SIZE}"
          pages=0
          echo '[]' > "${workdir}/accum.json"

          while [[ -n "${url}" && "${pages}" -lt "${MAX_PAGES}" ]]; do
            code="$(curl -sS -o "${workdir}/page.json" -w "%{http_code}" "${url}")"
            if [[ "${code}" == "404" ]]; then
              echo "Repository has no tags yet (404); all upstream tags are missing locally."
              echo '[]' > "${workdir}/existing-names.json"
              break
            fi
            if [[ "${code}" != "200" ]]; then
              echo "::error::Unexpected HTTP ${code} when listing ${url}"
              exit 1
            fi
            jq -s '.[0] + .[1].results' "${workdir}/accum.json" "${workdir}/page.json" \
              > "${workdir}/accum.next.json"
            mv "${workdir}/accum.next.json" "${workdir}/accum.json"
            url="$(jq -r '.next // empty' "${workdir}/page.json")"
            pages=$((pages + 1))
          done

          if [[ ! -f "${workdir}/existing-names.json" ]]; then
            jq -c '[.[].name | select(type == "string")]' "${workdir}/accum.json" \
              > "${workdir}/existing-names.json"
          fi

          tags_json="$(echo "${UPSTREAM_TAGS_JSON}" | jq -c --slurpfile existing "${workdir}/existing-names.json" '
            ($existing[0]) as $e
            | [ .[] | select(. as $t | ($e | index($t)) == null) ]
          ')"

          {
            echo "tags_json<<__TAGS_JSON__"
            echo "${tags_json}"
            echo "__TAGS_JSON__"
          } >> "${GITHUB_OUTPUT}"

          n="$(echo "${tags_json}" | jq 'length')"
          echo "Missing (not on Hub yet) (${n}):"
          echo "${tags_json}" | jq -r '.[]' | sed 's/^/  /'

  prepare:
    name: Prepare
    needs: filter-missing-tags
    if: ${{ needs.filter-missing-tags.outputs.tags_json != '[]' }}
    uses: ./.github/workflows/prepare.yaml

  build:
    name: "Build ${{ matrix.frankenphp-version }}"
    needs: [ filter-missing-tags, prepare ]
    if: ${{ needs.filter-missing-tags.outputs.tags_json != '[]' }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        frankenphp-version: ${{ fromJson(needs.filter-missing-tags.outputs.tags_json) }}
    uses: ./.github/workflows/build.yaml
    with:
      frankenphp-version: ${{ matrix.frankenphp-version }}
    secrets: inherit
