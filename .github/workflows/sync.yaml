name: Sync tags from dunglas/frankenphp

on:
  schedule:
    - cron: '0 0 * * 6'
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  packages: write

jobs:
  collect-tags:
    name: Collects tags from docker hub
    runs-on: ubuntu-latest
    outputs:
      tags_json: ${{ steps.fetch.outputs.tags_json }}
    steps:
      - name: Fetch tags
        id: fetch
        env:
          PAGE_SIZE: "100"
          MAX_PAGES: "50"
          MAX_TAGS: "200"
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          echo '[]' > "${workdir}/accum.json"
          url="https://hub.docker.com/v2/repositories/dunglas/frankenphp/tags?page_size=${PAGE_SIZE}"
          pages=0

          while [[ -n "${url}" && "${pages}" -lt "${MAX_PAGES}" ]]; do
            curl -fsSL "${url}" -o "${workdir}/page.json"
            jq -s '.[0] + .[1].results' "${workdir}/accum.json" "${workdir}/page.json" \
              > "${workdir}/accum.next.json"
            mv "${workdir}/accum.next.json" "${workdir}/accum.json"
            url="$(jq -r '.next // empty' "${workdir}/page.json")"
            pages=$((pages + 1))
          done

          # Names like 1-php8.5, 1.2-php8.3 — <fp>-php<php> (each part dotted 0–2 segments)
          jq -c '
            [ .[]
              | .name
              | select(
                  test("^[0-9]+(\\.[0-9]+){0,2}-php[0-9]+(\\.[0-9]+){0,2}(-(trixie|bookworm))?$")
                )
              ]
            | unique
            | sort
          ' "${workdir}/accum.json" > "${workdir}/filtered.json"

          max="${MAX_TAGS:-0}"
          if [[ "${max}" =~ ^[0-9]+$ ]] && [[ "${max}" -gt 0 ]]; then
            jq -c --argjson lim "${max}" '.[:$lim]' "${workdir}/filtered.json" > "${workdir}/limited.json"
            mv "${workdir}/limited.json" "${workdir}/filtered.json"
          fi

          n="$(jq 'length' "${workdir}/filtered.json")"
          if [[ "${n}" -gt 256 ]]; then
            echo "::warning::${n} tags match; GitHub matrix allows 256 jobs — truncating to 256."
            jq -c '.[:256]' "${workdir}/filtered.json" > "${workdir}/trunc.json"
            mv "${workdir}/trunc.json" "${workdir}/filtered.json"
            n=256
          fi

          tags_json="$(cat "${workdir}/filtered.json")"
          {
            echo "tags_json<<__TAGS_JSON__"
            echo "${tags_json}"
            echo "__TAGS_JSON__"
          } >> "${GITHUB_OUTPUT}"

          echo "Matching tags (${n}):"
          jq -r '.[]' "${workdir}/filtered.json" | sed 's/^/  /'

  filter-tags:
    name: Skip tags already on GHCR
    needs: collect-tags
    if: ${{ needs.collect-tags.outputs.tags_json != '[]' }}
    runs-on: ubuntu-latest
    outputs:
      tags_json: ${{ steps.filter.outputs.tags_json }}
    steps:
      - name: Drop tags that already exist on GHCR
        id: filter
        env:
          TAGS_JSON: ${{ needs.collect-tags.outputs.tags_json }}
        run: |
          set -euo pipefail
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          NAME="${OWNER}/frankenphp-unofficial-newrelic"

          printf '%s' "${TAGS_JSON}" > /tmp/desired.json

          # One (or a few) registry API calls instead of N manifest inspects.
          # https://distribution.github.io/distribution/spec/api/#listing-image-tags
          existing='[]'
          last=""
          page=0
          while true; do
            hdr="$(mktemp)"
            body="$(mktemp)"
            code="$(
              curl -sS -G -o "${body}" -D "${hdr}" -w '%{http_code}' \
                --data-urlencode 'n=1000' \
                ${last:+--data-urlencode "last=${last}"} \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H 'Accept: application/json' \
                "https://ghcr.io/v2/${NAME}/tags/list"
            )" || true
            rm -f "${hdr}"
            if [[ "${code}" == "404" ]]; then
              echo '::notice::No GHCR tags yet (404) — all desired tags will be built.'
              existing='[]'
              break
            fi
            if [[ "${code}" != "200" ]]; then
              echo "::warning::GHCR tags/list returned HTTP ${code} — assuming no existing tags."
              existing='[]'
              break
            fi
            batch="$(jq -c '.tags // []' "${body}")"
            rm -f "${body}"
            nbatch="$(echo "${batch}" | jq 'length')"
            existing="$(jq -s '.[0] + .[1]' <(echo "${existing}") <(echo "${batch}"))"
            page=$((page + 1))
            if [[ "${nbatch}" -lt 1000 ]]; then
              break
            fi
            last="$(echo "${batch}" | jq -r '.[-1]')"
            if [[ -z "${last}" || "${last}" == "null" ]]; then
              break
            fi
          done

          echo "Fetched $(echo "${existing}" | jq 'length') tag(s) from GHCR (${page} page(s))."

          missing="$(jq -n --argjson desired "$(cat /tmp/desired.json)" --argjson have "${existing}" '
            [ $desired[] as $t | select($have | index($t) | not) ]
          ')"

          skipped="$(jq -n --argjson desired "$(cat /tmp/desired.json)" --argjson have "${existing}" '
            [ $desired[] as $t | select($have | index($t)) ]
          ')"

          echo "${skipped}" | jq -r '.[]' | while read -r t; do
            echo "::notice::Skip (already on GHCR): ${t}"
          done

          echo "${missing}" | jq -r '.[]' | while read -r t; do
            echo "Will build: ${t}"
          done

          {
            echo "tags_json<<__OUT__"
            echo "${missing}"
            echo "__OUT__"
          } >> "${GITHUB_OUTPUT}"

          echo "Tags to build: $(echo "${missing}" | jq -c .)"

  prepare:
    name: Prepare
    needs: filter-tags
    if: ${{ needs.filter-tags.outputs.tags_json != '[]' }}
    uses: ./.github/workflows/prepare.yaml

  dispatch-builds:
    name: Dispatch build — ${{ matrix.frankenphp-version }}
    needs: [ collect-tags, filter-tags, prepare ]
    if: ${{ needs.filter-tags.outputs.tags_json != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        frankenphp-version: ${{ fromJson(needs.collect-tags.outputs.tags_json) }}
    steps:
      - name: Trigger build workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run build.yaml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}" \
            -f frankenphp-version="${{ matrix.frankenphp-version }}" \
            -f artifact-run-id="${{ github.run_id }}"
          echo "Dispatched build for ${{ matrix.frankenphp-version }} (artifact from run ${{ github.run_id }})."
