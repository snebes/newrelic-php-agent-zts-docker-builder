name: Sync tags from dunglas/frankenphp

on:
  schedule:
    - cron: '0 0 * * 6'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  collect-tags:
    name: Collects tags from docker hub
    runs-on: ubuntu-latest
    outputs:
      tags_json: ${{ steps.fetch.outputs.tags_json }}
    steps:
      - name: Fetch tags
        id: fetch
        env:
          PAGE_SIZE: "100"
          MAX_PAGES: "50"
          MAX_TAGS: "200"
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          echo '[]' > "${workdir}/accum.json"
          url="https://hub.docker.com/v2/repositories/dunglas/frankenphp/tags?page_size=${PAGE_SIZE}"
          pages=0

          while [[ -n "${url}" && "${pages}" -lt "${MAX_PAGES}" ]]; do
            curl -fsSL "${url}" -o "${workdir}/page.json"
            jq -s '.[0] + .[1].results' "${workdir}/accum.json" "${workdir}/page.json" \
              > "${workdir}/accum.next.json"
            mv "${workdir}/accum.next.json" "${workdir}/accum.json"
            url="$(jq -r '.next // empty' "${workdir}/page.json")"
            pages=$((pages + 1))
          done

          # Names like 1-php8.5, 1.2-php8.3 — <fp>-php<php> (each part dotted 0–2 segments)
          jq -c '
            [ .[]
              | .name
              | select(
                  test("^[0-9]+(\\.[0-9]+){0,2}-php[0-9]+(\\.[0-9]+){0,2}(-(trixie|bookworm))?$")
                )
              ]
            | unique
            | sort
          ' "${workdir}/accum.json" > "${workdir}/filtered.json"

          max="${MAX_TAGS:-0}"
          if [[ "${max}" =~ ^[0-9]+$ ]] && [[ "${max}" -gt 0 ]]; then
            jq -c --argjson lim "${max}" '.[:$lim]' "${workdir}/filtered.json" > "${workdir}/limited.json"
            mv "${workdir}/limited.json" "${workdir}/filtered.json"
          fi

          n="$(jq 'length' "${workdir}/filtered.json")"
          if [[ "${n}" -gt 256 ]]; then
            echo "::warning::${n} tags match; GitHub matrix allows 256 jobs — truncating to 256."
            jq -c '.[:256]' "${workdir}/filtered.json" > "${workdir}/trunc.json"
            mv "${workdir}/trunc.json" "${workdir}/filtered.json"
            n=256
          fi

          tags_json="$(cat "${workdir}/filtered.json")"
          {
            echo "tags_json<<__TAGS_JSON__"
            echo "${tags_json}"
            echo "__TAGS_JSON__"
          } >> "${GITHUB_OUTPUT}"

          echo "Matching tags (${n}):"
          jq -r '.[]' "${workdir}/filtered.json" | sed 's/^/  /'

  filter-tags:
    name: Skip tags already on Docker Hub
    needs: collect-tags
    if: ${{ needs.collect-tags.outputs.tags_json != '[]' }}
    runs-on: ubuntu-latest
    outputs:
      tags_json: ${{ steps.filter.outputs.tags_json }}
    steps:
      - name: Drop tags that already exist on Docker Hub
        id: filter
        env:
          TAGS_JSON: ${{ needs.collect-tags.outputs.tags_json }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          REPO_NAME="frankenphp-unofficial-newrelic"

          printf '%s' "${TAGS_JSON}" > /tmp/desired.json

          # https://docs.docker.com/docker-hub/api/latest/#tag/Images/operation/GetRepositoryTags
          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          existing='[]'
          url="https://hub.docker.com/v2/repositories/${DOCKERHUB_USERNAME}/${REPO_NAME}/tags?page_size=100"
          page=0
          while [[ -n "${url}" ]]; do
            code="$(curl -sS -o "${workdir}/page.json" -w '%{http_code}' "${url}")" || true
            if [[ "${code}" == "404" ]]; then
              echo '::notice::Docker Hub repository not found (404) — all desired tags will be built.'
              existing='[]'
              break
            fi
            if [[ "${code}" != "200" ]]; then
              echo "::warning::Docker Hub tags API returned HTTP ${code} — assuming no existing tags."
              existing='[]'
              break
            fi
            names="$(jq -c '[.results[]?.name // empty]' "${workdir}/page.json")"
            nbatch="$(echo "${names}" | jq 'length')"
            existing="$(jq -s '.[0] + .[1]' <(echo "${existing}") <(echo "${names}"))"
            page=$((page + 1))
            next="$(jq -r '.next // empty' "${workdir}/page.json")"
            if [[ -z "${next}" || "${next}" == "null" ]]; then
              url=""
            else
              url="${next}"
            fi
          done

          echo "Fetched $(echo "${existing}" | jq 'length') tag(s) from Docker Hub (${page} page(s))."

          missing="$(jq -n --argjson desired "$(cat /tmp/desired.json)" --argjson have "${existing}" '
            [ $desired[] as $t | select($have | index($t) | not) ]
          ')"

          skipped="$(jq -n --argjson desired "$(cat /tmp/desired.json)" --argjson have "${existing}" '
            [ $desired[] as $t | select($have | index($t)) ]
          ')"

          echo "${skipped}" | jq -r '.[]' | while read -r t; do
            echo "::notice::Skip (already on Docker Hub): ${t}"
          done

          echo "${missing}" | jq -r '.[]' | while read -r t; do
            echo "Will build: ${t}"
          done

          {
            echo "tags_json<<__OUT__"
            echo "${missing}"
            echo "__OUT__"
          } >> "${GITHUB_OUTPUT}"

          echo "Tags to build: $(echo "${missing}" | jq -c .)"

  prepare:
    name: Prepare
    needs: filter-tags
    if: ${{ needs.filter-tags.outputs.tags_json != '[]' }}
    uses: ./.github/workflows/prepare.yaml

  build:
    name: "Build ${{ matrix.frankenphp-version }}"
    needs: [ filter-tags, prepare ]
    if: ${{ needs.filter-tags.outputs.tags_json != '[]' }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        frankenphp-version: ${{ fromJson(needs.filter-tags.outputs.tags_json) }}
    uses: ./.github/workflows/build.yaml
    with:
      frankenphp-version: ${{ matrix.frankenphp-version }}
    secrets: inherit
