name: Build New Relic ZTS Agent

permissions:
  contents: read

env:
  artifact-name: newrelic-php-agent-zts
  frankenphp-image: dunglas/frankenphp
  # Pushed as ${{ vars.DOCKERHUB_USERNAME }}/dockerhub-repo-name
  dockerhub-repo-name: frankenphp-unofficial-newrelic

on:
  workflow_call:
    inputs:
      frankenphp-version:
        description: FrankenPHP tag for PHP_IMAGE build-arg (e.g. 1-php8.4)
        required: true
        type: string

jobs:
  build:
    name: Docker ${{ matrix.platform }} (${{ inputs['frankenphp-version'] }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: ['linux/arm/v7', 'linux/arm64', 'linux/amd64', 'linux/386']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download agent source artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.artifact-name }}
          path: newrelic-php-agent-zts

      - name: Copy Dockerfile.zts-build into newrelic-php-agent-zts
        run: |
          set -euo pipefail
          cp -v Dockerfile.zts-build newrelic-php-agent-zts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Agent
        uses: docker/build-push-action@v7
        with:
          context: newrelic-php-agent-zts
          file: newrelic-php-agent-zts/Dockerfile.zts-build
          target: package
          platforms: ${{ matrix.platform }}
          build-args: |
            PHP_IMAGE=${{ env.frankenphp-image }}:${{ inputs['frankenphp-version'] }}
          tags: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.dockerhub-repo-name }}:${{ inputs['frankenphp-version'] }}
          push: true
