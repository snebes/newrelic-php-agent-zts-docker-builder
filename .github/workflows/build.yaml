name: Build New Relic ZTS Agent

permissions:
  actions: write
  contents: read
  packages: write

env:
  artifact-name: newrelic-php-agent-zts
  frankenphp-image: dunglas/frankenphp

on:
  workflow_call:
    inputs:
      frankenphp-version:
        description: FrankenPHP tag for PHP_IMAGE build-arg (e.g. 1-php8.4)
        required: true
        type: string

jobs:
  build:
    name: Docker ${{ matrix.slug }} (${{ inputs.frankenphp-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/arm/v7
            slug: linux-arm-v7
          - platform: linux/arm64
            slug: linux-arm64
          - platform: linux/amd64
            slug: linux-amd64
          - platform: linux/386
            slug: linux-386
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download agent source artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.artifact-name }}
          path: newrelic-php-agent-zts

      - name: Copy Dockerfile.zts-build into newrelic-php-agent-zts
        run: |
          set -euo pipefail
          cp -v Dockerfile.zts-build newrelic-php-agent-zts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Agent
        uses: docker/build-push-action@v7
        with:
          context: newrelic-php-agent-zts
          file: newrelic-php-agent-zts/Dockerfile.zts-build
          target: package
          platforms: ${{ matrix.platform }}
          build-args: |
            PHP_IMAGE=${{ env.frankenphp-image }}:${{ inputs.frankenphp-version }}
          tags: ghcr.io/${{ github.repository_owner }}/frankenphp-unofficial-newrelic:${{ inputs.frankenphp-version }}
          push: true
          cache-from: type=gha,scope=zts-${{ matrix.slug }}-${{ inputs.frankenphp-version }}-builder
          cache-to: type=gha,mode=max,scope=zts-${{ matrix.slug }}-${{ inputs.frankenphp-version }}-builder
